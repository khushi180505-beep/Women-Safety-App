<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Women Safety App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Women Safety App</h1>

        <button id="sosBtn">SOS EMERGENCY</button>

        <button id="locationBtn">Get Current Location</button>

        <div id="location"></div>

        <div class="contact-card">
            <h3>Emergency Contact</h3>
            <p>Police: 112</p>
            <p>Women Helpline: 1091</p>
        </div>

        <div class="tips">
            <h3>Safety Tips</h3>
            <ul>
                <li>Share your live location with trusted contacts.</li>
                <li>Stay in well-lit areas.</li>
                <li>Keep emergency numbers saved.</li>
                <li>Trust your instincts.</li>
            </ul>
        </div>
    </div>

    <audio id="alarm">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>

</body>
                              </html>
